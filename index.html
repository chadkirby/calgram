<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon and Apple Touch Icon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <!-- Web App Manifest for PWA/A2HS -->
    <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials" />

    <!-- Viewport and Theming -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />

    <!-- iOS A2HS: enable standalone and status bar appearance -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- App is light-only; use default (light) status bar -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sammygram" />

    <!-- Canonical and Social Meta -->
    <link rel="canonical" href="https://sammygram.app/" />
    <meta property="og:site_name" content="Sammygram Calorie Tracker" />
    <meta property="og:title" content="Sammygram Calorie Tracker" />
    <meta property="og:url" content="https://sammygram.app/" />
    <meta property="og:image" content="/logo.webp" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sammygram Calorie Tracker" />

    <title>Sammygram Calorie Tracker</title>
  </head>
  <body class="h-full flex flex-col">
    <div id="root" class="align-self-center flex-1"></div>
    <script type="module" src="/src/Main.tsx"></script>
  </body>
</html>
