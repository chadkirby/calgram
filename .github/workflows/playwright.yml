name: E2E - Playwright

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CI: true
  VOLTA_FEATURE_PNPM: 1

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Volta
        uses: volta-cli/action@v4

      - name: Verify toolchain (Volta)
        run: |
          volta --version
          node -v
          corepack enable
          pnpm -v

      # Cache Strategy:
      # 1. Try exact match using pnpm-lock.yaml hash
      # 2. If no match, fall back to any previous cache for this OS
      # 3. If still no match, create new cache
      - name: Cache pnpm dependencies
        uses: actions/cache@v3
        with:
          # Define what paths should be cached
          path: |
            **/node_modules
            ~/.pnpm-store
          # Primary cache key - unique per pnpm-lock.yaml change
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          # Fallback key - matches any previous cache for this OS/pnpm combo
          # Useful when dependencies partially change
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # Similar cache strategy for Playwright browsers
      # Avoids re-downloading browsers on every run
      - name: Cache Playwright browsers
        uses: actions/cache@v3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Install Playwright if not in cache
      - name: Install Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          pnpm playwright install
          pnpm playwright install-deps

      - name: Run Playwright tests
        env:
          HOME: ${{ runner.temp }}
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-report
          path: blob-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test-results (traces/videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 7
