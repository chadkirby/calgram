name: E2E - Playwright

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CI: true
  VOLTA_FEATURE_PNPM: 1
  PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Volta
        uses: volta-cli/action@v4

      - name: Verify toolchain (Volta)
        run: |
          volta --version
          node -v
          corepack enable
          pnpm -v

      # Cache Strategy:
      # 1. Try exact match using pnpm-lock.yaml hash
      # 2. If no match, fall back to any previous cache for this OS
      # 3. If still no match, create new cache
      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # Cache Playwright browsers to avoid re-downloads
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Use official Microsoft Playwright Action to set up browsers and system deps
      - name: Setup Playwright
        uses: microsoft/playwright-github-action@v1
        with:
          # Reuse cached browsers if available; the action will install missing bits
          with-deps: true
          install-dependencies: true
          # Don't install browsers if cache hit? Let the action validate; still fine with cache
          # Browsers path controlled via env PLAYWRIGHT_BROWSERS_PATH

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-report
          path: blob-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test-results (traces/videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 7
