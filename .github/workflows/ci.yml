name: CI - Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CI: true

jobs:
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Volta
        run: |
          curl https://get.volta.sh | bash -s -- --skip-setup
          echo "$HOME/.volta/bin" >> $GITHUB_PATH

      - name: Verify toolchain (Volta)
        run: |
          volta --version
          node -v
          corepack enable
          pnpm -v || true
          # Ensure pnpm version from package.json/volta is available
          volta install pnpm@$(jq -r '.volta.pnpm // empty' package.json || echo "")
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (if needed by tests)
        run: |
          if pnpm -s run | grep -q "^build\b"; then
            pnpm build
          else
            echo "No build script found, skipping"
          fi

      - name: Run unit tests
        run: |
          if pnpm -s run | grep -qE "^(test|test:unit)\b"; then
            if pnpm -s run | grep -q "^test:unit\b"; then
              pnpm test:unit -- --reporter=default --coverage --run
            else
              pnpm test -- --reporter=default --coverage --run
            fi
          else
            # Fallback to vitest if no scripts present
            npx vitest run --reporter=default --coverage
          fi

      - name: Upload coverage (if exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: |
            coverage/**
            .coverage/**
          if-no-files-found: ignore
          retention-days: 7
