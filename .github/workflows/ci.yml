name: CI - Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CI: true
  VOLTA_FEATURE_PNPM: 1

jobs:
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Volta
        uses: volta-cli/action@v4

      - name: Verify toolchain (Volta)
        run: |
          volta --version
          node -v
          corepack enable
          pnpm -v

      # Cache Strategy:
      # 1. Try exact match using pnpm-lock.yaml hash
      # 2. If no match, fall back to any previous cache for this OS
      # 3. If still no match, create new cache
      - name: Cache pnpm dependencies
        uses: actions/cache@v3
        with:
          # Define what paths should be cached
          path: |
            **/node_modules
            ~/.pnpm-store
          # Primary cache key - unique per pnpm-lock.yaml change
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          # Fallback key - matches any previous cache for this OS/pnpm combo
          # Useful when dependencies partially change
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Upload coverage (if exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: |
            coverage/**
            .coverage/**
          if-no-files-found: ignore
          retention-days: 7
